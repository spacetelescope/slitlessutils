name: CI Tests

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  schedule:
    # Run every Monday at 4am UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TOXARGS: '-v'

permissions:
  contents: read

jobs:
  tests:
    name: ${{ matrix.prefix }} ${{ matrix.os }}, ${{ matrix.tox_env }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      matrix:
        include:
          # remote-data test fails with 3.13 due to drizzlepac
          # deprecation (requires drizzlepac >= 3.11.0)
          # https://github.com/spacetelescope/drizzlepac/pull/2059
          - os: ubuntu-latest
            python: '3.12'
            tox_env: 'py312-test-cov'
            toxposargs: --remote-data=any
            allow_failure: false
            prefix: ''

          - os: ubuntu-latest
            python: '3.13'
            tox_env: 'py313-test'
            allow_failure: false
            prefix: ''

          - os: macos-latest
            python: '3.13'
            tox_env: 'py313-test'
            allow_failure: false
            prefix: ''

          - os: windows-latest
            python: '3.13'
            tox_env: 'py313-test'
            allow_failure: false
            prefix: ''

          - os: ubuntu-latest
            python: '3.14'
            tox_env: 'py314-test'
            allow_failure: false
            prefix: ''

          - os: ubuntu-latest
            python: '3.x'
            tox_env: 'codestyle'
            allow_failure: false
            prefix: ''

          - os: ubuntu-latest
            python: '3.x'
            tox_env: 'pep517'
            allow_failure: false
            prefix: ''

          - os: ubuntu-latest
            python: '3.x'
            tox_env: 'securityaudit'
            allow_failure: false
            prefix: ''

          - os: ubuntu-latest
            python: '3.14'
            tox_env: 'py314-test-devdeps'
            allow_failure: true
            prefix: '(Allowed failure)'

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          persist-credentials: false
          python-version: ${{ matrix.python }}
      - name: Install base dependencies
        run: python -m pip install --upgrade pip setuptools tox
      - name: Print Python, pip, setuptools, and tox versions
        run: |
          python -c "import sys; print(f'Python {sys.version}')"
          python -c "import pip; print(f'pip {pip.__version__}')"
          python -c "import setuptools; print(f'setuptools {setuptools.__version__}')"
          python -c "import tox; print(f'tox {tox.__version__}')"
      - name: Run tests
        run: tox -e ${{ matrix.tox_env }} -- ${{ matrix.toxposargs }}
      - name: Upload coverage to codecov
        if: ${{ contains(matrix.tox_env, '-cov') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          verbose: true
